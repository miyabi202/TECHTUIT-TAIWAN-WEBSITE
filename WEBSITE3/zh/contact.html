<form action="https://formspree.io/f/mdayqkvv" method="POST">

  <input type="hidden" name="_subject" value="供應商合作洽詢 - TechTuit Taiwan">
  <input type="text" name="_gotcha" style="display:none">

  <div class="row g-3">

    <div class="col-md-6">
      <input type="text" name="company" class="form-control" placeholder="公司名稱" required>
    </div>

    <div class="col-md-6">
      <input type="text" name="name" class="form-control" placeholder="聯絡人" required>
    </div>

    <div class="col-md-6">
      <input type="email" name="email" class="form-control" placeholder="Email" required>
    </div>

    <div class="col-md-6">
      <input type="text" name="product" class="form-control" placeholder="產品類型 / 服務項目">
    </div>

    <div class="col-12">
      <textarea name="message" class="form-control" rows="5" placeholder="產品 / 公司介紹"></textarea>
    </div>

  </div>

  <button type="submit" class="btn btn-primary mt-4">送出資料</button>

</form>
