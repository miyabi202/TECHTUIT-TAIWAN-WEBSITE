<form action="https://formspree.io/f/mdayqkvv" method="POST">

  <input type="hidden" name="_subject" value="Supplier Contact - TechTuit Taiwan">
  <input type="text" name="_gotcha" style="display:none">

  <div class="row g-3">

    <div class="col-md-6">
      <input type="text" name="company" class="form-control" placeholder="Company Name" required>
    </div>

    <div class="col-md-6">
      <input type="text" name="name" class="form-control" placeholder="Contact Person" required>
    </div>

    <div class="col-md-6">
      <input type="email" name="email" class="form-control" placeholder="Email" required>
    </div>

    <div class="col-md-6">
      <input type="text" name="product" class="form-control" placeholder="Product Category / Service">
    </div>

    <div class="col-12">
      <textarea name="message" class="form-control" rows="5" placeholder="Product / Company Introduction"></textarea>
    </div>

  </div>

  <button type="submit" class="btn btn-primary mt-4">Submit</button>

</form>
